apiVersion: batch/v1
kind: Job
metadata:
  name: brainwatch-bronze-ingest
  namespace: brainwatch
spec:
  template:
    metadata:
      labels:
        app: brainwatch-bronze-ingest
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bronze-ingest
          image: bitnami/spark:3.5
          command:
            - /bin/bash
            - -c
            - |
              spark-submit \
                --master spark://spark-master:7077 \
                --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 \
                --conf spark.sql.streaming.checkpointLocation=/data/checkpoints \
                /app/scripts/start_bronze_ingest.py
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: brainwatch-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: BRONZE_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: brainwatch-config
                  key: BRONZE_PREFIX
          resources:
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
